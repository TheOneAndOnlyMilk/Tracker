<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proximity Beacon</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:80vh; }
#panel { padding:10px; }
button { font-size:18px; padding:8px; }
</style>
</head>

<body>

<div id="panel">
<button onclick="startApp()">Start</button>
<div id="status">Press Start</div>
<div id="distance"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([0,0], 2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom:19 }
).addTo(map);

let target=null;
let targetMarker=null;
let userMarker=null;

let audioCtx;
let lastBeep=0;

function startApp(){

document.getElementById("status").innerText="Starting GPS";

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

navigator.geolocation.watchPosition(updatePosition, gpsError,{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
});
}

function beep(){

const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value=900;

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
audioCtx.currentTime+0.2
);

osc.stop(audioCtx.currentTime+0.2);
}

map.on("click",function(e){

target=e.latlng;

if(targetMarker) map.removeLayer(targetMarker);

targetMarker=L.marker(target).addTo(map);

document.getElementById("status").innerText="Target placed";
});

function updatePosition(pos){

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

document.getElementById("status").innerText="GPS active";

if(userMarker){
userMarker.setLatLng([lat,lon]);
}
else{
userMarker=L.marker([lat,lon]).addTo(map);
map.setView([lat,lon],16);
}

if(target){

const d=distance(lat,lon,target.lat,target.lng);

document.getElementById("distance").innerText=
"Distance: "+Math.round(d)+" m";

let interval=Math.max(150,d*4);

if(Date.now()-lastBeep>interval){

beep();
lastBeep=Date.now();
}
}
}

function gpsError(err){

document.getElementById("status").innerText=
"GPS error: "+err.message;
}

function distance(lat1,lon1,lat2,lon2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;
}

</script>

</body>
</html>
