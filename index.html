<script>

let map = L.map('map').setView([0,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let target=null;
let targetMarker=null;
let userMarker=null;

let audioCtx;
let oscillator;
let gainNode;

let pulseInterval = 800;
let lastPulse = 0;

function startApp(){

audioCtx = new (window.AudioContext || window.webkitAudioContext)();

oscillator = audioCtx.createOscillator();
gainNode = audioCtx.createGain();

oscillator.frequency.value = 900;

gainNode.gain.value = 0;

oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);

oscillator.start();

navigator.geolocation.watchPosition(updatePosition,gpsError,{
enableHighAccuracy:true
});
}

function pulse(){

let now = audioCtx.currentTime;

gainNode.gain.cancelScheduledValues(now);

gainNode.gain.setValueAtTime(0,now);
gainNode.gain.linearRampToValueAtTime(1,now+0.01);
gainNode.gain.linearRampToValueAtTime(0,now+0.08);

}

function updatePosition(pos){

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

if(userMarker){
userMarker.setLatLng([lat,lon]);
}else{
userMarker=L.marker([lat,lon]).addTo(map);
map.setView([lat,lon],16);
}

if(target){

const d=distance(lat,lon,target.lat,target.lng);

pulseInterval = Math.max(60, d*3);

if(Date.now()-lastPulse>pulseInterval){

pulse();
lastPulse=Date.now();

}
}

}

map.on("click",function(e){

target=e.latlng;

if(targetMarker) map.removeLayer(targetMarker);

targetMarker=L.marker(target).addTo(map);

});

function gpsError(e){
console.log(e);
}

function distance(lat1,lon1,lat2,lon2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;
}

</script>
